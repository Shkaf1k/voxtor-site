<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Survival Forest: Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        
        /* ГЛАВНОЕ МЕНЮ */
        #main-menu {
            position: absolute; width: 100%; height: 100%; z-index: 200;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1351&q=80');
            background-size: cover; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .menu-btn {
            width: 250px; padding: 15px; margin: 10px; font-size: 20px;
            background: rgba(255,255,255,0.1); color: white; border: 2px solid #fff;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .menu-btn:hover { background: #fff; color: #000; }

        /* ОКНО НАСТРОЕК */
        #settings-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #fff; color: white;
            display: none; z-index: 210; min-width: 300px;
        }

        /* ИНВЕНТАРЬ И КРАФТ */
        #inventory-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 400px; background: rgba(20,20,20,0.95);
            border: 2px solid #555; display: none; z-index: 150; color: white; padding: 20px;
        }
        .inv-container { display: flex; gap: 20px; }
        .slots-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; }
        .craft-list { width: 200px; border-left: 1px solid #444; padding-left: 20px; }
        .slot { width: 60px; height: 60px; background: #333; border: 1px solid #555; display: flex; justify-content: center; align-items: center; font-size: 24px; position: relative; }
        .craft-item { background: #444; padding: 10px; margin-bottom: 10px; cursor: pointer; font-size: 14px; border-radius: 4px; }
        .craft-item:hover { background: #666; }

        /* HUD */
        .hud { position: absolute; bottom: 20px; left: 20px; z-index: 50; }
        .bar-wrap { width: 200px; height: 15px; background: #222; margin-top: 5px; border-radius: 10px; overflow: hidden; }
        .bar { height: 100%; transition: 0.3s; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; border: 1px solid black;}
    </style>
</head>
<body>

    <div class="crosshair"></div>

    <div id="main-menu">
        <h1 style="color: white; font-size: 60px; text-shadow: 4px 4px 0px #000;">FOREST SURVIVAL</h1>
        <button class="menu-btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="menu-btn" onclick="toggleSettings(true)">НАСТРОЙКИ</button>
    </div>

    <div id="settings-menu">
        <h2>НАСТРОЙКИ</h2>
        <label>Чувствительность: <input type="range" id="sens" min="1" max="10" value="5"></label><br><br>
        <label>Дальность тумана: <input type="range" id="fogRange" min="10" max="200" value="50"></label><br><br>
        <button class="menu-btn" style="width: 100%;" onclick="toggleSettings(false)">ЗАКРЫТЬ</button>
    </div>

    <div id="inventory-ui">
        <h2>ИНВЕНТАРЬ / КРАФТ</h2>
        <div class="inv-container">
            <div class="slots-grid" id="inv-slots"></div>
            <div class="craft-list">
                <h3>Крафт</h3>
                <div class="craft-item" onclick="craft('axe')">🪓 Топор (2 Дерева)</div>
                <div class="craft-item" onclick="craft('wall')">🧱 Стена (3 Дерева)</div>
                <div class="craft-item" onclick="craft('fire')">🔥 Костер (5 Дерева)</div>
            </div>
        </div>
        <p style="font-size: 12px; color: #888;">Нажми 'I', чтобы выйти</p>
    </div>

    <div class="hud">
        HP <div class="bar-wrap"><div id="hp-bar" class="bar" style="background: #ff4757; width: 100%;"></div></div>
        ЕДА <div class="bar-wrap"><div id="food-bar" class="bar" style="background: #ffa502; width: 100%;"></div></div>
        ЭНЕРГИЯ <div class="bar-wrap"><div id="stamina-bar" class="bar" style="background: #1e90ff; width: 100%;"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ИНИЦИАЛИЗАЦИЯ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const fog = new THREE.Fog(0x87CEEB, 1, 50);
        scene.fog = fog;

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.4));

        // --- ИГРОВЫЕ ДАННЫЕ ---
        let gameActive = false;
        let stats = { hp: 100, food: 100, stamina: 100 };
        let inv = { "🪵": 0, "🍎": 0, "🪓": 0 };
        const controls = new PointerLockControls(camera, document.body);

        // --- МИР ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x3d5e2f }));
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
        scene.add(ground);

        function addTree() {
            const x = Math.random()*160-80; const z = Math.random()*160-80;
            const t = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2), new THREE.MeshStandardMaterial({color: 0x4b3621}));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2), new THREE.MeshStandardMaterial({color: 0x228b22}));
            trunk.position.y = 1; leaves.position.y = 2.5;
            t.add(trunk, leaves); t.position.set(x, 0, z);
            t.userData = { type: 'tree' };
            scene.add(t);
        }
        for(let i=0; i<50; i++) addTree();

        // --- ФУНКЦИИ МЕНЮ ---
        window.startGame = () => {
            document.getElementById('main-menu').style.display = 'none';
            controls.lock();
            gameActive = true;
        };

        window.toggleSettings = (show) => {
            document.getElementById('settings-menu').style.display = show ? 'block' : 'none';
        };

        // --- УПРАВЛЕНИЕ И ИНВЕНТАРЬ ---
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyI' && gameActive) {
                const ui = document.getElementById('inventory-ui');
                if(ui.style.display === 'block') {
                    ui.style.display = 'none'; controls.lock();
                } else {
                    ui.style.display = 'block'; controls.unlock();
                    renderInv();
                }
            }
            if(e.code === 'KeyE' && gameActive) collect();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function collect() {
            // Простейшая проверка на добычу дерева (если рядом)
            inv["🪵"] += 1;
            renderInv();
        }

        window.craft = (item) => {
            if(item === 'axe' && inv["🪵"] >= 2) { inv["🪵"] -= 2; inv["🪓"] += 1; }
            if(item === 'wall' && inv["🪵"] >= 3) { inv["🪵"] -= 3; placeWall(); }
            renderInv();
        };

        function renderInv() {
            const grid = document.getElementById('inv-slots');
            grid.innerHTML = '';
            for(let key in inv) {
                if(inv[key] > 0) {
                    grid.innerHTML += `<div class="slot">${key} <span style="font-size:12px; position:absolute; bottom:2px; right:2px;">${inv[key]}</span></div>`;
                }
            }
        }

        function placeWall() {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 0.3), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            wall.position.addVectors(camera.position, dir.multiplyScalar(3));
            wall.position.y = 1;
            wall.rotation.y = camera.rotation.y;
            scene.add(wall);
        }

        // --- ОСНОВНОЙ ЦИКЛ ---
        function update() {
            requestAnimationFrame(update);
            
            if (controls.isLocked && gameActive) {
                const speed = 0.15;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);

                // Статы
                stats.food -= 0.005;
                if(stats.food <= 0) stats.hp -= 0.01;
                
                document.getElementById('hp-bar').style.width = stats.hp + '%';
                document.getElementById('food-bar').style.width = stats.food + '%';
                
                // Настройки в реальном времени
                fog.far = document.getElementById('fogRange').value;
            }
            renderer.render(scene, camera);
        }

        camera.position.y = 1.6;
        update();

        // Фикс ресайза
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
