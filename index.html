<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXTOR | Официальный сайт игры</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container { text-align: center; }
        h1 {
            font-size: 5rem;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(45deg, #478cff, #9d47ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 20px rgba(71, 140, 255, 0.5));
        }
        p {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .status {
            margin-top: 30px;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 5px;
            display: inline-block;
            font-size: 0.9rem;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOXTOR</h1>
        <p>Built with Godot 4.6.1</p>
        <div class="status">СТАДИЯ: РАЗРАБОТКА КОНЦЕПТА</div>
    </div>
</body>
</html>
