<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Лес на GitHub</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.5); padding: 20px;
            font-family: sans-serif; text-align: center; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>Кликни, чтобы начать играть</h1>
        <p>(WASD — ходить, Мышка — осмотреться, ESC — выйти)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Сцена и небо
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Голубое небо
        scene.fog = new THREE.Fog(0x87CEEB, 0, 50); // Туман для глубины

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; // Рост игрока

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Свет
        const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 1);
        scene.add(light);

        // 3. Земля
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 4. Генерация деревьев
        function createTree(x, z) {
            const group = new THREE.Group();
            
            // Ствол
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.2, 1);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.5;
            group.add(trunk);

            // Листва
            const leavesGeo = new THREE.ConeGeometry(1, 2, 8);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x006400 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 2;
            group.add(leaves);

            group.position.set(x, 0, z);
            scene.add(group);
        }

        // Сажаем 50 случайных деревьев
        for (let i = 0; i < 50; i++) {
            const x = Math.random() * 80 - 40;
            const z = Math.random() * 80 - 40;
            if (Math.abs(x) > 5 || Math.abs(z) > 5) createTree(x, z);
        }

        // 5. Управление
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // 6. Цикл анимации
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const speed = 0.15;
                
                direction.z = Number(keys['KeyW'] || keys['ArrowUp']) - Number(keys['KeyS'] || keys['ArrowDown']);
                direction.x = Number(keys['KeyD'] || keys['ArrowRight']) - Number(keys['KeyA'] || keys['ArrowLeft']);
                direction.normalize();

                if (keys['KeyW'] || keys['KeyS'] || keys['ArrowUp'] || keys['ArrowDown']) {
                    controls.moveForward(direction.z * speed);
                }
                if (keys['KeyA'] || keys['KeyD'] || keys['ArrowLeft'] || keys['ArrowRight']) {
                    controls.moveRight(direction.x * speed);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
