<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Лес: Начало</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Стили главного меню */
        #menu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { margin-top: 0; font-size: 48px; color: #2ecc71; text-shadow: 0 0 20px rgba(46, 204, 113, 0.5); }
        
        button {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #27ae60; transform: scale(1.05); }

        .controls-info { margin-top: 20px; color: #ccc; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-card">
            <h1>3D FOREST</h1>
            <p>Добро пожаловать в симулятор прогулки</p>
            <button id="startButton">ИГРАТЬ</button>
            <div class="controls-info">
                WASD — Передвижение<br>
                Мышь — Обзор<br>
                ESC — Меню
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. Настройка сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 0, 60);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 3. Земля
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x348C31 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 4. Деревья
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.3, 1.5),
                new THREE.MeshStandardMaterial({ color: 0x5D4037 })
            );
            trunk.position.y = 0.75;
            group.add(trunk);

            const leaves = new THREE.Mesh(
                new THREE.ConeGeometry(1.2, 2.5, 8),
                new THREE.MeshStandardMaterial({ color: 0x1B5E20 })
            );
            leaves.position.y = 2.5;
            group.add(leaves);

            group.position.set(x, 0, z);
            scene.add(group);
        }

        for (let i = 0; i < 60; i++) {
            const x = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            if (Math.sqrt(x*x + z*z) > 7) createTree(x, z);
        }

        // 5. Логика управления
        const controls = new PointerLockControls(camera, document.body);
        const menu = document.getElementById('menu');
        const startButton = document.getElementById('startButton');

        startButton.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => menu.style.display = 'none');
        controls.addEventListener('unlock', () => menu.style.display = 'flex');

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // 6. Обновление кадров
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const speed = 0.12;
                
                // Исправленная логика движения:
                // moveForward(положительное) = вперед
                if (keys['KeyW'] || keys['ArrowUp']) controls.moveForward(speed);
                if (keys['KeyS'] || keys['ArrowDown']) controls.moveForward(-speed);
                if (keys['KeyA'] || keys['ArrowLeft']) controls.moveRight(-speed);
                if (keys['KeyD'] || keys['ArrowRight']) controls.moveRight(speed);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
