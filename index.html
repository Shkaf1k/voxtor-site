<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Unturned Web Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        #main-menu, #settings-menu {
            position: absolute; width: 100%; height: 100%; z-index: 200;
            background: #4a6d34; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #settings-menu { display: none; background: #2e4521; }

        .menu-btn {
            width: 280px; padding: 15px; margin: 10px; font-size: 20px; font-weight: bold;
            background: #5e8a42; color: white; border: 4px solid #1a2a12; cursor: pointer;
        }

        #hud { position: absolute; bottom: 20px; left: 20px; z-index: 50; color: white; }
        .bar-bg { width: 200px; height: 15px; background: #333; border: 2px solid #000; margin-bottom: 10px; }
        .bar-fill { height: 100%; width: 100%; transition: 0.2s; }
        
        #inventory-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; background: rgba(0,0,0,0.8); border: 3px solid #fff;
            display: none; z-index: 150; color: white; padding: 20px;
        }

        .crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; transform: translate(-50%, -50%); z-index: 10; 
        }
    </style>
</head>
<body>

    <div class="crosshair"></div>

    <div id="main-menu">
        <h1 style="color: white; font-size: 60px; margin-bottom: 40px;">UNTURNED</h1>
        <button class="menu-btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="menu-btn" onclick="showSettings(true)">НАСТРОЙКИ</button>
    </div>

    <div id="settings-menu">
        <h2 style="color: white;">НАСТРОЙКИ</h2>
        <div style="color: white; margin-bottom: 20px;">
            Чувствительность: <input type="range" id="sens-input" min="1" max="50" value="20"><br><br>
            Дальность (Fog): <input type="range" id="fog-input" min="20" max="200" value="100">
        </div>
        <button class="menu-btn" onclick="showSettings(false)">НАЗАД</button>
    </div>

    <div id="inventory-ui">
        <h2>ИНВЕНТАРЬ (I)</h2>
        <div id="inv-items">🪵 Дерево: <span id="wood-count">0</span></div>
        <hr>
        <button onclick="craftWall()" style="padding: 10px; cursor: pointer;">Создать стену (3 дерева)</button>
    </div>

    <div id="hud">
        HP <div class="bar-bg"><div id="hp-bar" class="bar-fill" style="background: #ff4757;"></div></div>
        ЕДА <div class="bar-bg"><div id="food-bar" class="bar-fill" style="background: #ffa502;"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- ДВИЖОК ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- СВЕТ (Чтобы не было черным) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Общий свет
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        const controls = new PointerLockControls(camera, document.body);
        let gameActive = false;
        let wood = 0;
        let hp = 100;
        let food = 100;

        // --- ОБЪЕКТЫ ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x5e8a42 }));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        // Деревья
        const trees = [];
        function spawnTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), new THREE.MeshStandardMaterial({color: 0x4b3621}));
            const top = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: 0x2e4521}));
            trunk.position.y = 1.5; top.position.y = 3.5;
            group.add(trunk, top); group.position.set(x, 0, z);
            scene.add(group);
            trees.push(group);
        }
        for(let i=0; i<30; i++) spawnTree(Math.random()*100-50, Math.random()*100-50);

        // Рука/Оружие
        const hand = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0xdbac82}));
        hand.position.set(0.5, -0.4, -0.6);
        camera.add(hand);
        scene.add(camera);

        // --- ФУНКЦИИ ИНТЕРФЕЙСА ---
        window.startGame = () => {
            document.getElementById('main-menu').style.display = 'none';
            controls.lock();
            gameActive = true;
        };

        window.showSettings = (val) => {
            document.getElementById('settings-menu').style.display = val ? 'flex' : 'none';
        };

        window.craftWall = () => {
            if(wood >= 3) {
                wood -= 3;
                document.getElementById('wood-count').innerText = wood;
                const wall = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x4b3621}));
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                wall.position.addVectors(camera.position, dir.multiplyScalar(4));
                wall.position.y = 1;
                wall.rotation.y = camera.rotation.y;
                scene.add(wall);
            }
        };

        // --- ЛОГИКА ---
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyI' && gameActive) {
                const inv = document.getElementById('inventory-ui');
                if(inv.style.display === 'block') { inv.style.display = 'none'; controls.lock(); }
                else { inv.style.display = 'block'; controls.unlock(); }
            }
            if(e.code === 'KeyE' && gameActive) {
                // Добыча дерева (если рядом)
                trees.forEach(t => {
                    if(camera.position.distanceTo(t.position) < 4) {
                        wood++;
                        document.getElementById('wood-count').innerText = wood;
                    }
                });
            }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if(gameActive && controls.isLocked) {
                // Движение
                const speed = 0.12;
                if(keys['KeyW']) controls.moveForward(speed);
                if(keys['KeyS']) controls.moveForward(-speed);
                if(keys['KeyA']) controls.moveRight(-speed);
                if(keys['KeyD']) controls.moveRight(speed);

                // Статы
                food -= 0.005;
                if(food <= 0) hp -= 0.01;
                document.getElementById('hp-bar').style.width = hp + '%';
                document.getElementById('food-bar').style.width = food + '%';

                // Применяем настройки
                const sens = document.getElementById('sens-input').value / 1000;
                controls.pointerSpeed = sens * 10;
                
                const fogDist = document.getElementById('fog-input').value;
                scene.fog = new THREE.Fog(0x87CEEB, 1, fogDist);
            }
            renderer.render(scene, camera);
        }
        
        camera.position.y = 1.6;
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
