<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Survival Forest</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #menu, #inventory {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            color: white; z-index: 100;
        }
        #inventory { display: none; background: rgba(0,0,0,0.5); }
        .ui-bars {
            position: absolute; bottom: 20px; left: 20px; width: 250px;
            z-index: 50; display: flex; flex-direction: column; gap: 10px;
        }
        .bar-container { width: 100%; height: 20px; background: #333; border: 2px solid #fff; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        #hp-bar { background: #ff4757; width: 100%; }
        #food-bar { background: #ffa502; width: 100%; }
        #stamina-bar { background: #1e90ff; width: 100%; }
        .inv-slot { width: 50px; height: 50px; border: 2px solid #fff; margin: 5px; display: inline-block; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="menu">
        <div style="text-align:center">
            <h1>SURVIVAL FOREST</h1>
            <button id="startButton" style="padding: 15px 30px; font-size: 20px; cursor:pointer;">НАЧАТЬ</button>
        </div>
    </div>

    <div id="inventory">
        <div style="background: #222; padding: 20px; border-radius: 10px; text-align: center;">
            <h2>ИНВЕНТАРЬ</h2>
            <div class="inv-slot">🍎</div><div class="inv-slot"></div><div class="inv-slot"></div>
            <p>Нажми 'I' чтобы закрыть</p>
        </div>
    </div>

    <div class="ui-bars">
        <div>HP</div><div class="bar-container"><div id="hp-bar" class="bar-fill"></div></div>
        <div>ЕДА</div><div class="bar-container"><div id="food-bar" class="bar-fill"></div></div>
        <div>ВЫНОСЛИВОСТЬ</div><div class="bar-container"><div id="stamina-bar" class="bar-fill"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambientLight);
        
        // --- ПЕРЕМЕННЫЕ ИГРОКА ---
        let stats = { hp: 100, food: 100, stamina: 100 };
        let canJump = false;
        let velocity = new THREE.Vector3();
        const treeObjects = [];
        const mobs = [];

        // --- ОБЪЕКТЫ ---
        // Земля
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x348C31 }));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        // Река
        const river = new THREE.Mesh(new THREE.PlaneGeometry(20, 200), new THREE.MeshStandardMaterial({ color: 0x1e90ff, transparent: true, opacity: 0.8 }));
        river.rotation.x = -Math.PI/2; river.position.y = 0.05; river.position.x = 30;
        scene.add(river);

        // Деревья с коллизией
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 2), new THREE.MeshStandardMaterial({ color: 0x5D4037 }));
            trunk.position.y = 1; group.add(trunk);
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: 0x1B5E20 }));
            leaves.position.y = 2.5; group.add(leaves);
            group.position.set(x, 0, z);
            scene.add(group);
            treeObjects.push({ x: x, z: z, radius: 0.8 });
        }
        for(let i=0; i<40; i++) createTree(Math.random()*80-40, Math.random()*80-40);

        // Мобы (Слаймы)
        function createMob() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            mesh.position.set(Math.random()*40-20, 0.5, Math.random()*40-20);
            scene.add(mesh);
            mobs.push(mesh);
        }
        for(let i=0; i<5; i++) createMob();

        // --- УПРАВЛЕНИЕ ---
        const controls = new PointerLockControls(camera, document.body);
        const startButton = document.getElementById('startButton');
        const invScreen = document.getElementById('inventory');
        
        startButton.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => { document.getElementById('menu').style.display = 'none'; });
        controls.addEventListener('unlock', () => { if(invScreen.style.display !== 'flex') document.getElementById('menu').style.display = 'flex'; });

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyI') {
                const isOpen = invScreen.style.display === 'flex';
                invScreen.style.display = isOpen ? 'none' : 'flex';
                if(!isOpen) controls.unlock();
            }
            if(e.code === 'Space' && canJump) { velocity.y += 5; canJump = false; }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- ЛОГИКА ---
        function updateUI() {
            document.getElementById('hp-bar').style.width = stats.hp + '%';
            document.getElementById('food-bar').style.width = stats.food + '%';
            document.getElementById('stamina-bar').style.width = stats.stamina + '%';
        }

        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - lastTime) / 1000;

            if (controls.isLocked) {
                // Гравитация и прыжок
                velocity.y -= 9.8 * delta; 
                camera.position.y += velocity.y * delta;

                if (camera.position.y < 1.6) {
                    velocity.y = 0; camera.position.y = 1.6; canJump = true;
                }

                // Движение и стамина
                let moveSpeed = 0.12;
                if (keys['KeyW'] && stats.stamina > 0.5) {
                    controls.moveForward(moveSpeed);
                    stats.stamina -= 0.1;
                } else if (stats.stamina < 100) {
                    stats.stamina += 0.05;
                }
                if (keys['KeyS']) controls.moveForward(-moveSpeed);
                if (keys['KeyA']) controls.moveRight(-moveSpeed);
                if (keys['KeyD']) controls.moveRight(moveSpeed);

                // Коллизия с деревьями
                treeObjects.forEach(tree => {
                    let dx = camera.position.x - tree.x;
                    let dz = camera.position.z - tree.z;
                    let dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist < tree.radius) {
                        let angle = Math.atan2(dz, dx);
                        camera.position.x = tree.x + Math.cos(angle) * tree.radius;
                        camera.position.z = tree.z + Math.sin(angle) * tree.radius;
                    }
                });

                // Мобы преследуют
                mobs.forEach(mob => {
                    mob.position.x += (camera.position.x - mob.position.x) * 0.01;
                    mob.position.z += (camera.position.z - mob.position.z) * 0.01;
                    if(mob.position.distanceTo(camera.position) < 1.5) stats.hp -= 0.2;
                });

                // Голод
                stats.food -= 0.005;
                if(stats.food <= 0) stats.hp -= 0.01;
                if(stats.hp <= 0) location.reload(); // Смерть

                updateUI();
            }
            lastTime = time;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
