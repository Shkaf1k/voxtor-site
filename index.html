<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXTOR | Development</title>
    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Анимация сканирования (полоса на экране) */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .container { text-align: center; z-index: 3; }

        h1 {
            font-size: 6rem;
            letter-spacing: 20px;
            margin: 0;
            color: #fff;
            text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9; }
            2% { text-shadow: 5px 0px #ff00c1, -5px 0px #00fff9; }
            4% { text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9; }
        }

        p {
            font-size: 1rem;
            color: #478cff;
            margin-top: 10px;
            letter-spacing: 5px;
            opacity: 0.8;
        }

        .btn-discord {
            margin-top: 50px;
            padding: 12px 30px;
            border: 1px solid #478cff;
            background: transparent;
            color: #478cff;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            display: inline-block;
        }

        .btn-discord:hover {
            background: #478cff;
            color: #000;
            box-shadow: 0 0 20px #478cff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOXTOR</h1>
        <p>> INITIALIZING_PROJECT_GODOT_4.6.1</p>
        <br>
        <a href="#" class="https://discord.gg/u6xyB6whSa">JOIN DISCORD (SOON)</a>
    </div>
</body>
</html>
